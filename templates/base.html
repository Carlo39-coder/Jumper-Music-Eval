<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} – Jumper</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome für Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Deine eigene CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            min-height: 100vh;
        }

        /* Vollbild-Hintergrund ohne schwarze Ränder */
        .bg-full {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/static/kier-in-sight-archives-GROaOafbSKY-unsplash.jpg') center/cover no-repeat fixed;
            z-index: -1;
        }

        /* Horizontale Top-Bar (wie Bandcamp) */
        .top-bar {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .navbar-brand {
            transition: transform 0.3s;
        }

        .navbar-brand:hover {
            transform: scale(1.1);
        }

        .nav-link {
            transition: all 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            color: #ffcc00 !important;
            transform: scale(1.05);
        }

        main {
            margin-top: 70px; /* Abstand zur fixierten Top-Bar */
        }

        @media (max-width: 768px) {
            main {
                margin-top: 60px;
            }
        }
    </style>
</head>
<body>
    <!-- Vollbild-Hintergrund -->
    <div class="bg-full"></div>

    <!-- Horizontale Top-Bar -->
    <nav class="navbar navbar-expand top-bar fixed-top">
        <div class="container-fluid px-4">
            <!-- Nur das gelbe Notensymbol (Logo) – ohne Text, ohne Umrandung -->
             <a class="navbar-brand" href="{{ url_for('index') }}">
                 <img src="{{ url_for('static', filename='bitte nur vorne das logo ohne dahinter Jumper als einzelnesbild.jpg') }}" 
                     alt="Jumper Logo" 
                     width="55" 
                     height="55">
            </a>

            <!-- Menü rechts -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    {% if current_user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link text-light {% if request.endpoint == 'submit' %}active{% endif %}" href="{{ url_for('submit') }}">
                                <i class="fas fa-upload me-1"></i> Upload
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-light {% if request.endpoint == 'tracks' %}active{% endif %}" href="{{ url_for('tracks') }}">
                                <i class="fas fa-music me-1"></i> Tracks
                            </a>
                        </li>
                        {% if current_user.is_admin %}
                            <li class="nav-item">
                                <a class="nav-link text-warning {% if request.endpoint == 'admin_users' %}active{% endif %}" href="{{ url_for('admin_users') }}">
                                    <i class="fas fa-users-cog me-1"></i> Admin
                                </a>
                            </li>
                        {% endif %}
                        <li class="nav-item">
                            <a class="nav-link text-light" href="{{ url_for('logout') }}">
                                <i class="fas fa-sign-out-alt me-1"></i> Logout
                            </a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link text-light {% if request.endpoint == 'login' %}active{% endif %}" href="{{ url_for('login') }}">
                                <i class="fas fa-sign-in-alt me-1"></i> Login
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-light {% if request.endpoint == 'register' %}active{% endif %}" href="{{ url_for('register') }}">
                                <i class="fas fa-user-plus me-1"></i> Registrieren
                            </a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hauptinhalt – mit Abstand zur Top-Bar -->
    <main class="container-fluid px-4 py-5" style="margin-top: 70px;">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
