<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} – Jumper</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome für Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Deine eigene CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-dark text-white">

    <!-- Haupt-Hintergrundbild (bündig in die Ecken, keine schwarzen Ränder) -->
    <div class="background-image"></div>

    <!-- Sidebar (von unten nach oben, horizontal links → rechts) -->
    <nav class="sidebar bg-dark border-end border-secondary vh-100 position-fixed top-0 start-0 d-flex flex-column p-3 shadow-lg">
        <!-- Jumper Logo ganz oben links -->
        <a href="{{ url_for('index') }}" class="d-flex align-items-center mb-4 text-decoration-none">
            <img src="{{ url_for('static', filename='944b8f32-b8af-43ca-bfe4-7df6a20c3435_preview_rev_1.png') }}" alt="Jumper Logo" width="60" height="60" class="me-3 rounded-circle">
            <span class="fs-4 fw-bold text-warning">Jumper</span>
        </a>

        <!-- Menüpunkte untereinander (vertikal) -->
        <ul class="nav flex-column w-100">
            <li class="nav-item mb-2">
                <a class="nav-link text-light {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">
                    <i class="fas fa-home me-2"></i> Home
                </a>
            </li>
            <li class="nav-item mb-2">
                <a class="nav-link text-light {% if request.endpoint == 'kriterien_theorie' %}active{% endif %}" href="{{ url_for('kriterien_theorie') }}">
                    <i class="fas fa-book me-2"></i> Kriterien Theorie
                </a>
            </li>

            {% if current_user.is_authenticated %}
                <li class="nav-item mb-2">
                    <a class="nav-link text-light {% if request.endpoint == 'submit' %}active{% endif %}" href="{{ url_for('submit') }}">
                        <i class="fas fa-upload me-2"></i> Track einreichen
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-light {% if request.endpoint == 'tracks' %}active{% endif %}" href="{{ url_for('tracks') }}">
                        <i class="fas fa-music me-2"></i> Alle Tracks
                    </a>
                </li>
                {% if current_user.is_admin %}
                    <li class="nav-item mb-2">
                        <a class="nav-link text-warning {% if request.endpoint == 'admin_users' %}active{% endif %}" href="{{ url_for('admin_users') }}">
                            <i class="fas fa-users-cog me-2"></i> Admin: User
                        </a>
                    </li>
                {% endif %}
                <li class="nav-item mb-2">
                    <a class="nav-link text-light" href="{{ url_for('logout') }}">
                        <i class="fas fa-sign-out-alt me-2"></i> Logout
                    </a>
                </li>
            {% else %}
                <li class="nav-item mb-2">
                    <a class="nav-link text-light {% if request.endpoint == 'login' %}active{% endif %}" href="{{ url_for('login') }}">
                        <i class="fas fa-sign-in-alt me-2"></i> Login
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-light {% if request.endpoint == 'register' %}active{% endif %}" href="{{ url_for('register') }}">
                        <i class="fas fa-user-plus me-2"></i> Registrieren
                    </a>
                </li>
            {% endif %}
        </ul>

        <!-- Platzhalter unten, damit Inhalt nicht überlappt -->
        <div class="mt-auto"></div>
    </nav>

    <!-- Hauptinhalt – mit Abstand zur Sidebar -->
    <main class="ms-0 ms-md-5 p-4" style="min-height: 100vh;">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
